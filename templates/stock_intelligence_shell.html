<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Stock Intelligence{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="stock-intelligence-standalone dark-mode">
    <main class="container-fluid stock-intelligence-standalone-main">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
            <div>
                <div class="small text-muted">Market AI</div>
                <h1 class="h3 mb-0">Stock Intelligence</h1>
            </div>
            <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('dashboard') }}">
                <i class="fa-solid fa-gauge-high me-2"></i>Trading Dashboard
            </a>
        </div>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    (function() {
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
        if (!window.fetch || !csrfToken) {
            return;
        }
        const safeMethods = ['GET', 'HEAD', 'OPTIONS', 'TRACE'];
        const nativeFetch = window.fetch.bind(window);
        window.fetch = function(input, init = {}) {
            const method = (init.method || 'GET').toUpperCase();
            const url = typeof input === 'string' ? input : (input && input.url ? input.url : '');
            const sameOrigin = !url || url.startsWith('/') || new URL(url, window.location.origin).origin === window.location.origin;
            if (!safeMethods.includes(method) && sameOrigin) {
                const headers = new Headers(init.headers || (input && input.headers) || {});
                if (!headers.has('X-CSRF-Token')) {
                    headers.set('X-CSRF-Token', csrfToken);
                }
                init.headers = headers;
            }
            return nativeFetch(input, init);
        };
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
