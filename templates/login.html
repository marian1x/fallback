<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .auth-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }
    .auth-card {
      width: min(100%, 440px);
      border-radius: 16px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(120deg, rgba(100, 255, 218, 0.18), rgba(0, 123, 255, 0.15));
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--card-border);
    }
    .auth-header h1 {
      font-size: 1.2rem;
      margin: 0;
    }
    .auth-body {
      padding: 1rem 1.25rem 1.25rem;
    }
    @media (max-width: 576px) {
      .auth-body {
        padding: 0.9rem;
      }
      .auth-header {
        padding: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-header">
        <h1 class="fw-semibold">Trading Dashboard</h1>
        <div class="small text-muted">Secure sign in</div>
      </div>
      <div class="auth-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} py-2 px-3 small mb-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          {% if next_url %}
          <input type="hidden" name="next" value="{{ next_url }}">
          {% endif %}
          <div class="mb-2">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" autocomplete="current-password" required>
          </div>
          <button class="btn btn-primary w-100">Login</button>
        </form>

        <div class="text-center mt-3 small">
          <a href="{{ url_for('register') }}">Don't have an account? Register</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function() {
      const currentTheme = localStorage.getItem('theme') || 'dark';
      if (currentTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>
</body>
</html>
